single_choice: |
  你是一位网络安全渗透测试专家，熟悉MITRE ATT&CK框架。请根据以下要求生成一道单项选择题：

  【知识点信息】
  - 战术: {tactic_name} ({tactic_id}) - {tactic_description}
  - 技术: {technique_name} ({technique_id})
  - 子技术: {sub_technique_name} ({sub_technique_id})
  - 技术描述: {technique_description}

  【题目要求】
  - 题型: 单项选择题
  - 题目类型: {question_type}

  【输出格式】
  请严格按照以下JSON格式输出，不要添加任何其他内容：
  ```json
  {{
    "question": "题目内容（清晰明确的问题）",
    "options": {{
      "A": "选项A内容",
      "B": "选项B内容",
      "C": "选项C内容",
      "D": "选项D内容"
    }},
    "correct_answer": "正确答案字母（如：B）",
    "explanation": "详细解析，说明为什么该答案正确，其他选项为什么错误",
    "difficulty": "难度等级（easy/medium/hard，根据题目复杂度判断）"
  }}
  ```

  【质量要求】
  1. 题目必须准确反映该技术的核心特点或应用场景
  2. 正确答案必须唯一且明确
  3. 干扰选项应具有合理迷惑性，但不能产生歧义
  4. 解析应详细说明答案的正确性，并分析其他选项的错误原因
  5. 避免使用"以上都是"或"以上都不是"等模糊选项
  6. 难度判断标准：easy-基础概念题，medium-应用理解题，hard-综合分析题

multiple_choice: |
  你是一名网络安全专家，熟悉MITRE ATT&CK框架。
  
  请根据MITRE ATT&CK框架中**{tactic_name}** ({tactic_id})战术下的技术生成{num_questions}道高质量多选题。
  
  【战术信息】
  - 战术: {tactic_name} ({tactic_id})
  - 战术描述: {tactic_description}
  - 相关技术: 
  {techniques_list}
  
  【题目要求】
  - 题型: 多项选择题
  - 题目类型: {question_type}
  - **重要**: 每道题目必须从上述技术列表中选择**3-6个有关联的技术**进行组合
  - 考察这些技术之间的关联关系、执行顺序或依赖关系
  - 题目之间的技术覆盖应不完全重合
  - 每道题选项为5个（A、B、C、D、E）
  - 每道题正确答案为2-4个
  - 要适当加入干扰选项增加难度
  
  【输出格式】
  请严格按照以下JSON格式输出，不要添加任何其他内容：
  ```json
  [
    {{
      "question": "题目内容",
      "options": {{
        "A": "选项A内容",
        "B": "选项B内容",
        "C": "选项C内容",
        "D": "选项D内容",
        "E": "选项E内容"
      }},
      "correct_answer": ["正确答案字母数组"],
      "explanation": "详细解析",
      "difficulty": "难度等级",
      "involved_techniques": ["涉及的技术ID列表"]
    }},
    {{
      "question": "第二道题目内容",
      "options": {{
        "A": "选项A内容",
        "B": "选项B内容",
        "C": "选项C内容",
        "D": "选项D内容",
        "E": "选项E内容"
      }},
      "correct_answer": ["正确答案字母数组"],
      "explanation": "详细解析",
      "difficulty": "难度等级",
      "involved_techniques": ["涉及的技术ID列表"]
    }}
  ]
  ```

  【质量要求】
  1. 必须从提供的技术列表中选择多个技术进行组合
  2. 选择的技术应有明确的关联关系
  3. 题目必须准确反映技术之间的关联关系
  4. 正确答案数量应在2-4个之间
  5. 题目应明确指出需要选择"所有正确答案"
  6. 每个选项都应独立可判断
  7. 解析应逐一分析每个选项
  8. 干扰选项应具有合理迷惑性，但不能产生歧义
  9. 难度判断标准：easy-基础概念题，medium-应用理解题，hard-综合分析题

