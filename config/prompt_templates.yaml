sequencing: |
  你是一位网络安全渗透测试专家，熟悉MITRE ATT&CK框架。请根据以下要求生成排序题：

  【知识点信息】
  - 战术: {tactic_name} ({tactic_id})
  - 战术描述: {tactic_description}
  - 该战术下的所有技术: 
  {techniques_list}

  【题目要求】
  - 题型: 排序题
  - 问题类型: {question_type}
  - 请一次性生成 {num_questions} 道排序题
  - **重要**: 每道题目必须从上述技术列表中选择**3-6个有关联的技术**进行组合
  - 考察这些技术之间的执行顺序、逻辑关系或依赖关系
  - 每道题目提供4-6个步骤选项（对应选择的技术）
  - 不同题目应选择不同的技术组合，避免重复
  - 题目应清晰说明排序的依据

  【输出格式】
  请严格按照以下JSON格式输出，不要添加任何其他内容：
  ```json
  [
    {{
      "question": "题目内容（要求按照正确顺序排列）",
      "options": {{
        "A": "步骤A（技术名称）",
        "B": "步骤B（技术名称）",
        "C": "步骤C（技术名称）",
        "D": "步骤D（技术名称）"
      }},
      "correct_answer": ["正确顺序数组", "如：[\"C\", \"A\", \"D\", \"B\"]"],
      "explanation": "详细解析，说明为什么是这个顺序，涉及哪些技术",
      "difficulty": "难度等级（easy/medium/hard）",
      "involved_techniques": ["涉及的技术ID列表"]
    }},
    // 更多题目...
  ]
  ```

  【质量要求】
  1. 必须从提供的技术列表中选择多个技术进行组合
  2. 选择的技术应有明确的逻辑顺序或依赖关系
  3. 排序项应有明确的逻辑顺序
  4. 题目应清晰说明排序的依据
  5. 解析应说明每一步骤之间的逻辑关系
  6. 每道题目应选择不同的技术组合，避免重复
  7. 难度应根据题目复杂度合理设置

