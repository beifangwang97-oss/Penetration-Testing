scenario: |
  你是一位网络安全渗透测试专家，熟悉MITRE ATT&CK框架。请根据以下要求生成一道场景题：

  【知识点信息】
  - 战术: {tactic_name} ({tactic_id}) - {tactic_description}
  - 技术: {technique_name} ({technique_id})
  - 子技术: {sub_technique_name} ({sub_technique_id})
  - 技术描述: {technique_description}

  【题目要求】
  - 题型: 场景分析题
  - 难度: {difficulty}
  - 考察重点: 综合应用、实战分析

  【输出格式】
  请严格按照以下JSON格式输出：
  ```json
  {{
    "scenario": "详细的攻击场景描述（包含背景、目标、环境等信息）",
    "question": "基于场景的问题（可以是选择题或问答题形式）",
    "options": {{
      "A": "选项A（如果是选择题）",
      "B": "选项B"
    }},
    "correct_answer": "正确答案",
    "explanation": "详细解析，结合场景分析",
    "knowledge_points": ["知识点1", "知识点2"],
    "related_techniques": ["相关技术ID1", "相关技术ID2"]
  }}
  ```

  【质量要求】
  1. 场景描述应真实可信，具有实战背景
  2. 场景应包含足够的上下文信息
  3. 问题应紧密结合场景，考察综合分析能力
  4. 解析应结合场景具体分析

scenario_single_choice: |
  你是一位网络安全渗透测试专家，熟悉MITRE ATT&CK框架。请根据以下要求生成一道场景化单项选择题：

  【知识点信息】
  - 战术: {tactic_name} ({tactic_id}) - {tactic_description}
  - 技术: {technique_name} ({technique_id})
  - 子技术: {sub_technique_name} ({sub_technique_id})
  - 技术描述: {technique_description}

  【题目要求】
  - 题型: 场景化单项选择题
  - 题目类型: scenario_single_choice
  - 请先构造一个真实可信的攻击或防御分析场景，再基于该场景提出一个单项选择问题
  - 场景需包含 2-4 个关键线索，例如攻击入口、执行痕迹、日志现象、通信行为、持久化迹象、检测或缓解动作
  - 问题必须依赖场景信息才能作答，删除场景后不应轻易答出
  - 正确答案必须唯一且明确
  - 干扰项必须与场景相关，不能是明显错误的无关选项
  - 场景中的线索必须围绕当前技术或子技术展开，不要加入与正确答案无关的冗余线索
  - 如果问题是在判断 ATT&CK 技术，则四个选项都必须使用“技术名 (Txxxx 或 Txxxx.xxx)”格式
  - 如果给定了子技术（即 `{sub_technique_id}` 与 `{technique_id}` 不同），正确答案必须指向该子技术本身，不要退化成父技术
  - 不要把正确技术名配上错误的 ATT&CK ID，也不要让多个选项复用同一个 ATT&CK ID
  - 干扰项可以是相近技术，但必须是不同的 ATT&CK 技术，且不能只是攻击链上前一阶段或后一阶段的随意动作
  - 可考察的方向包括：最可能使用的 ATT&CK 技术、最合理的下一步攻击动作、最合适的检测/缓解措施、最符合场景的攻击者行为判断

  【输出格式】
  请严格按照以下JSON格式输出，不要添加任何其他内容：
  ```json
  {{
    "scenario": "场景描述，包含背景、攻击行为和关键线索",
    "question": "基于场景提出的单项选择问题",
    "options": {{
      "A": "选项A内容",
      "B": "选项B内容",
      "C": "选项C内容",
      "D": "选项D内容"
    }},
    "correct_answer": "正确答案字母（如：B）",
    "explanation": "详细解析，说明为什么该答案最符合场景，并分析其他选项不成立的原因",
    "difficulty": "难度等级（easy/medium/hard）",
    "related_techniques": ["场景中涉及的ATT&CK技术ID1", "场景中涉及的ATT&CK技术ID2"],
    "scenario_tags": ["场景标签1", "场景标签2"]
  }}
  ```

  【质量要求】
  1. 场景必须真实可信，具有明确上下文和可推断线索
  2. 问题必须依赖场景信息，不能退化为普通知识题
  3. 正确答案必须唯一，且与场景线索形成直接对应
  4. 解析必须解释场景中的关键证据，并说明其他选项为什么不最优
  5. related_techniques 至少包含当前技术或子技术，也可以补充场景中关联的其他技术
  6. scenario_tags 使用简洁英文标签，如 phishing、powershell、lateral-movement、credential-access
  7. 难度判断标准：easy-线索直接，medium-需要综合两到三个线索，hard-需要结合多阶段行为判断
  8. 场景应避免引入无法支持答案判断的无关细节
  9. 如果正确答案对应某个 ATT&CK 技术，则该选项文本必须显式包含对应技术 ID
  10. 优先考查最具体、最贴合证据的技术粒度；若场景证据足以定位到子技术，就不要把答案写成父技术
  11. 场景中至少要有一处证据能直接支撑正确选项，而不是仅靠题外常识猜测

review: |
  你是一位网络安全专家审核员，请审核以下渗透测试能力评估题目的质量：

  【题目内容】
  {question_data}

  【审核要点】
  1. 技术准确性：答案是否正确？技术描述是否准确？
  2. 题目清晰度：表述是否明确无歧义？
  3. 选项合理性：干扰项是否合理？是否有明显错误选项？
  4. 解析完整性：解析是否充分？是否解释了正确答案的原因？
  5. 知识点相关性：题目是否有效考察了目标知识点？

  【输出格式】
  请严格按照以下JSON格式输出：
  ```json
  {{
    "is_valid": true或false,
    "score": 0-100的评分,
    "issues": ["发现的问题1", "发现的问题2"],
    "suggestions": ["改进建议1", "改进建议2"],
    "correctness_check": {{
      "answer_correct": true或false,
      "explanation_accurate": true或false
    }},
    "quality_check": {{
      "clarity_score": 0-100,
      "option_quality_score": 0-100,
      "explanation_score": 0-100
    }}
  }}
  ```
